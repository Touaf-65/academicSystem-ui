<script src="program.ts"></script>

<app-notifications></app-notifications>

<div class="container mx-auto px-4 py-6 space-y-8">

  <div class="flex flex-col  col-span-3 rounded-lg bg-background p-4 border border-border/50 shadow-lg hover:shadow-xl transition-shadow duration-300">

    <!-- Container principal -->
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">

      <!-- Titre -->
      <div>
        <h2 class="text-xl font-semibold text-foreground">
          Programmes
        </h2>

        <p class="text-sm text-muted-foreground mt-1">
          Gestion des programmes des départements
        </p>
      </div>

      <!-- Bouton ajout -->
      <button
        class="inline-flex items-center justify-center gap-2 rounded-lg bg-primary px-5 py-2.5 text-sm font-medium text-primary-foreground shadow hover:opacity-90 transition-all duration-200"
        (click)="openModalCreateProgram()">

        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 4v16m8-8H4">
          </path>
        </svg>

        Ajouter un programme
      </button>
    </div>

    <!-- Select Container -->
    <div class="grid grid-cols-1 md:grid-cols-5 flex flex-col md:flex-row md:items-center md:justify-between gap-5 mb-6">

      <!-- Select Wrapper -->
      <div class="mb-6 relative col-span-2">

        <!-- Select -->
        <select
          id="department"
          class="w-full appearance-none rounded-lg border border-border bg-background px-4 py-2.5 pr-10 text-sm text-foreground shadow-sm outline-none transition-all duration-200 hover:border-primary/40 focus:border-primary focus:ring-2 focus:ring-primary/20">

          <option value="">
            Sélectionner un département
          </option>

          <option value="fst">
            Faculté des Sciences et Technologies
          </option>

          <option value="fse">
            Faculté des Sciences Économiques
          </option>

          <option value="flsh">
            Faculté des Lettres et Sciences Humaines
          </option>

          <option value="fm">
            Faculté de Médecine
          </option>

        </select>

        <!-- Icon -->
        <div
          class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-muted-foreground">

          <svg
            class="h-4 w-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24">

            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="m19 9-7 7-7-7">
            </path>
          </svg>
        </div>
      </div>

      <!-- Barre de recherche -->
      <div class="mb-6 col-span-3">
        <div class="relative w-full">

          <!-- Icon -->
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
            <svg class="w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="m21 21-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z">
              </path>
            </svg>
          </div>

          <!-- Input -->
          <input
            type="text"
            placeholder="Rechercher un programme..."
            class="w-full rounded-lg border border-border bg-background px-10 py-2.5 text-sm text-foreground outline-none transition-all focus:border-primary focus:ring-2 focus:ring-primary/20">
        </div>
      </div>

    </div>

    <!-- Table -->
    <div class="overflow-x-auto rounded-xl border border-border/50">

      <table class="w-full text-sm text-left text-foreground">

        <!-- Header -->
        <thead class="bg-background border-b border-border/50 text-xs uppercase text-muted-foreground">
        <tr>
          <th class="px-6 py-4 font-semibold">Nom du programme</th>
          <th class="px-6 py-4 font-semibold">Code</th>
          <th class="px-6 py-4 font-semibold text-center">Cycle</th>
          <th class="px-6 py-4 font-semibold text-center">Actions</th>
        </tr>
        </thead>

        <!-- Body -->
        <tbody>

        <!-- Row 1 -->
        <tr *ngFor="let p of programs; let i = index"
            [ngClass]="{'bg-background': i % 2 === 1, 'hover:bg-gray-200': true, 'dark:hover:bg-gray-600': true, 'cursor-pointer': true}"
            class="border-b border-border/40 hover:bg-muted/40 transition-colors duration-200">

          <td class="px-6 py-4 font-medium">
              {{p.nom}}
          </td>

          <td class="px-6 py-4">
            <span
              class="inline-flex items-center rounded-md bg-primary/10 px-2.5 py-1 text-xs font-semibold text-primary">
              {{p.code}}
            </span>
          </td>

          <td class="px-6 py-4 text-center">
            <span
              class="inline-flex items-center justify-center rounded-full bg-green-100 dark:bg-green-900/30 px-3 py-1 text-xs font-semibold text-green-700 dark:text-green-300">
              {{p.cycle}}
            </span>
          </td>

          <!-- Actions -->
          <td class="px-6 py-4">
            <div class="flex items-center justify-center gap-3">

              <!-- Voir -->
              <button class="text-primary hover:text-primary/70 transition-colors"
                      (click)="openModalViewProgram()">

                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z">
                  </path>

                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7Z">
                  </path>
                </svg>
              </button>

              <!-- Edit -->
              <button class="text-amber-500 hover:text-amber-600 transition-colors"
                      (click)="openModalEditProgram()">

                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M11 5H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2v-5">
                  </path>

                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="m18.5 2.5 3 3L12 15l-4 1 1-4 9.5-9.5Z">
                  </path>
                </svg>
              </button>

              <!-- Delete -->
              <button class="text-red-500 hover:text-red-600 transition-colors"
                      (click)="openModalDeleteProgram()">

                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M6 7h12">
                  </path>

                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M9 7V4h6v3">
                  </path>

                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M10 11v6">
                  </path>

                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M14 11v6">
                  </path>

                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M5 7l1 13h12l1-13">
                  </path>
                </svg>
              </button>

            </div>
          </td>
        </tr>

        </tbody>
      </table>
    </div>

    <!-- Footer -->
    <div class="mt-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">

      <!-- Results -->
      <p class="text-sm text-muted-foreground">
        Affichage de
        <span class="font-medium text-foreground">1</span>
        à
        <span class="font-medium text-foreground">2</span>
        sur
        <span class="font-medium text-foreground">6</span>
        résultats
      </p>

      <!-- Pagination -->
      <div class="flex items-center gap-2">

        <!-- Previous -->
        <button
          class="flex h-9 w-9 items-center justify-center rounded-lg border border-border bg-background text-muted-foreground hover:bg-muted transition-colors">

          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="m15 19-7-7 7-7">
            </path>
          </svg>
        </button>

        <!-- Active page -->
        <button
          class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary text-primary-foreground text-sm font-medium shadow">
          1
        </button>

        <!-- Next -->
        <button
          class="flex h-9 w-9 items-center justify-center rounded-lg border border-border bg-background text-muted-foreground hover:bg-muted transition-colors">

          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="m9 5 7 7-7 7">
            </path>
          </svg>
        </button>

      </div>
    </div>

  </div>

</div>

<app-modal [isOpen]="modalCreateOpen" title="Ajouter un programme" [size]="'lg'" (close) = "closeModalCreateProgram()">
  <div class="flex flex-col md:flex-row gap-4 justify-between mb-4">
    <div class="form__group">
      <label for="code">Code : </label>
      <input type="text" id="code" class="form__input">
    </div>
    <div class="form__group">
      <label for="name">Nom : </label>
      <input type="text" id="name" class="form__input">
    </div>
  </div>
  <div class="form__group">
    <label for="department">Département</label>
    <select id="department"  class="form__input">
      <option value="Informatique">Informatique</option>
      <option value="Economie">Economie</option>
      <option value="Sciences Humaines">Sciences Humaines</option>
    </select>
  </div>
  <div class="form__group">
    <label for="description">Description : </label>
    <textarea id="description" class="form__input textarea textarea-bordered w-full"></textarea>
  </div>
  <hr>
  <div class="flex justify-center gap-2 mt-4">
    <button class="flex-none rounded-md bg-primary px-4 py-2.5 text-xs font-semibold text-primary-foreground"
            (click)="confirmCreateProgram()">Créer</button>
    <button class="flex-none rounded-md bg-gray-900 px-4 py-2.5 text-xs font-semibold text-primary-foreground"
            (click)="closeModalCreateProgram()">Annuler</button>
  </div>

</app-modal>

<app-modal [isOpen]="modalViewOpen" title="Programme : " [size]="'lg'" (close) = "closeModalViewProgram()">
  <div class="flex flex-col md:flex-row gap-4 justify-between mb-4">
    <div class="form__group">
      <label for="code_v">Code : </label>
      <input type="text" id="code_v" class="form__input">
    </div>
    <div class="form__group">
      <label for="name_v">Nom : </label>
      <input type="text" id="name_v" class="form__input">
    </div>
  </div>
  <div class="form__group">
    <label for="description_v">Description : </label>
    <textarea id="description_v" class="form__input textarea textarea-bordered w-full"></textarea>
  </div>
  <hr>
  <div class="flex justify-center gap-2 mt-4">
    <button class="flex-none rounded-md bg-primary px-4 py-2.5 text-xs font-semibold text-primary-foreground"
    >Créer</button>
    <button class="flex-none rounded-md bg-gray-900 px-4 py-2.5 text-xs font-semibold text-primary-foreground"
            (click)="closeModalViewProgram()">Annuler</button>
  </div>

</app-modal>

<app-modal [isOpen]="modalEditOpen" title="Modifier le programme : " [size]="'lg'" (close) = "closeModalEditProgram()">
  <div class="flex flex-col md:flex-row gap-4 justify-between mb-4">
    <div class="form__group">
      <label for="code_e">Code : </label>
      <input type="text" id="code_e" class="form__input">
    </div>
    <div class="form__group">
      <label for="name_e">Nom : </label>
      <input type="text" id="name_e" class="form__input">
    </div>
  </div>
  <div class="form__group">
    <label for="department">Département</label>
    <select id="department"  class="form__input">
      <option value="Informatique">Informatique</option>
      <option value="Economie">Economie</option>
      <option value="Sciences Humaines">Sciences Humaines</option>
    </select>
  </div>
  <div class="form__group">
    <label for="description_e">Description : </label>
    <textarea id="description_e" class="form__input textarea textarea-bordered w-full"></textarea>
  </div>
  <hr>
  <div class="flex justify-center gap-2 mt-4">
    <button class="flex-none rounded-md bg-primary px-4 py-2.5 text-xs font-semibold text-primary-foreground"
            (click)="confirmEditProgram()">Créer</button>
    <button class="flex-none rounded-md bg-gray-900 px-4 py-2.5 text-xs font-semibold text-primary-foreground"
            (click)="closeModalEditProgram()">Annuler</button>
  </div>

</app-modal>

<app-modal [isOpen]="modalDeleteOpen" [title]="'Supprimer programme'" [size]="'md'" (close)="closeModalDeleteProgram()">

  <p class="text-lg text-justify text-red-700 dark:text-red-400">
    Êtes-vous sûr de vouloir <span class="font-semibold text-red-600 dark:text-red-300">supprimer le programme</span>
    &nbsp;
    <span class="font-bold text-slate-800 dark:text-white"> ....... </span>&nbsp;?
  </p>
  <br>
  <p class="text-xs text-gray-500 dark:text-zinc-300 mt-2">
    Cette action supprimera définitivement le programme du système.
  </p>
  <br>
  <hr>
  <div class="flex justify-center gap-2 mt-4">
    <button class="flex-none rounded-md bg-red-600 px-4 py-2.5 text-xs font-semibold text-white"
            (click)="confirmDeleteProgram()">Supprimer</button>
    <button class="flex-none rounded-md bg-gray-900 px-4 py-2.5 text-xs font-semibold text-primary-foreground"
            (click)="closeModalDeleteProgram()">Annuler</button>
  </div>

</app-modal>
