<div class="flex-col rounded-lg bg-background px-8 py-8 sm:flex-row border border-border/50">
  <div class="container">
    <igx-radial-gauge
      #radialGauge
      height="330px"
      width="100%"
      value="25"
      interval="5"
      minimumValue="0"
      maximumValue="50"
      labelInterval="10"
      labelExtent="0.71"
      minorTickCount="4"
      minorTickEndExtent=".625"

      minorTickStartExtent=".6"
      minorTickStrokeThickness="1"
      minorTickBrush="#79797a"
      tickStartExtent=".6"
      tickEndExtent=".65"
      tickStrokeThickness="2"
      tickBrush="#79797a"
      needleShape="Triangle"
      needleEndWidthRatio="0.03"
      needleStartWidthRatio="0.05"
      needlePivotShape="CircleOverlay"
      needlePivotWidthRatio="0.15"
      needleBaseFeatureWidthRatio="0.15"
      needleBrush="#79797a"
      needleOutline="#79797a"
      needlePivotBrush="#79797a"
      needlePivotOutline="#79797a"
      isNeedleDraggingEnabled="true"
      backingBrush="#fcfcfc"
      backingOutline="#d6d6d6"
      backingStrokeThickness="5"
      scaleStartAngle="120"
      scaleEndAngle="60"
      scaleBrush="#d6d6d6"
      rangeBrushes="#F86232, #DC3F76, #7446B9"
      rangeOutlines="#F86232, #DC3F76, #7446B9"
    >
    </igx-radial-gauge>
  </div>
